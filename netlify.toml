[build]
  publish = "."
  command = ""

[context.production.environment]
  NODE_VERSION = "16"

# Ensure /en/terms serves the static index.html (Netlify does this by default
# for /en/terms/index.html, but these rewrites make it explicit and handle
# trailing-slash variants)
[[redirects]]
  from = "/en/terms/"
  to = "/en/terms/index.html"
  status = 200

[[redirects]]
  from = "/tr/terms/"
  to = "/tr/terms/index.html"
  status = 200

[[redirects]]
  from = "/ru/terms/"
  to = "/ru/terms/index.html"
  status = 200

# Privacy page rewrites
[[redirects]]
  from = "/en/privacy/"
  to = "/en/privacy/index.html"
  status = 200

[[redirects]]
  from = "/tr/privacy/"
  to = "/tr/privacy/index.html"
  status = 200

[[redirects]]
  from = "/ru/privacy/"
  to = "/ru/privacy/index.html"
  status = 200

# Links hub page rewrite
[[redirects]]
  from = "/links"
  to = "/links/index.html"
  status = 200

# Cache static legal pages for 1 hour, revalidate after
[[headers]]
  for = "/en/terms/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

